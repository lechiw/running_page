name: Run Data Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - master

env:
  RUN_TYPE: skip_sync
  ATHLETE: liw
  TITLE: liw Running
  MIN_GRID_DISTANCE: 10
  TITLE_GRID: Over 10km Runs
  IGNORE_START_END_RANGE: 10
  IGNORE_POLYLINE: 'ktjrFoemeU~IorGq}DeB'
  IGNORE_RANGE: 10
  SAVE_DATA_IN_GITHUB_CACHE: false
  BUILD_GH_PAGES: true
  SAVE_TO_PARQENT: false
  GENERATE_MONTH_OF_LIFE: true
  BIRTHDAY_MONTH: 1990-01

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Sync from Codoon (retry on failure)
        continue-on-error: true
        run: |
          python run_page/codoon_sync.py ${{ secrets.CODON_MOBILE }} ${{ secrets.CODON_PASSWORD }} --with-gpx || echo "Sync skipped, using existing data"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable corepack and install
        run: |
          npm install -g corepack && corepack enable
          pnpm install

      - name: Make SVG
        run: |
          python run_page/gen_svg.py || echo "SVG gen skipped"

      - name: Build
        run: |
          pnpm build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
